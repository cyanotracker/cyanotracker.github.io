<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#151414" />
    <meta name="description" content="HAB Reporter email confirmation" />
    <link rel="icon" href="/cyanoTRACKER.ico" />
    <title>Email Confirmed | HAB Reporter</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        background:
          radial-gradient(circle at top, rgba(9, 149, 9, 0.22), transparent 45%),
          #000;
        color: #fff;
      }

      .card {
        width: min(100%, 480px);
        box-sizing: border-box;
        padding: 40px 32px;
        border: 1px solid rgba(9, 149, 9, 0.45);
        border-radius: 16px;
        background: #000;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        text-align: center;
      }

      .brand-logo {
        display: block;
        width: auto;
        height: 68px;
        margin: 0 auto 24px;
        object-fit: contain;
      }

      .icon {
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        border-radius: 50%;
        background: #099509;
        color: #fff;
        font-size: 34px;
        line-height: 56px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.75rem, 5vw, 2.25rem);
      }

      p {
        margin: 0;
        color: #dfdfdf;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      button {
        display: none;
        margin: 28px auto 0;
        padding: 12px 24px;
        border: 0;
        border-radius: 8px;
        background: #099509;
        color: #fff;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover,
      button:focus-visible {
        background: #0bb30b;
      }

      @media (max-width: 480px) {
        .card {
          padding: 32px 22px;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="title">
      <img class="brand-logo" src="../cyano-logo.png" alt="CyanoTRACKER" />
      <div class="icon" aria-hidden="true">✓</div>
      <h1 id="title">Email confirmed</h1>
      <p id="message">Email confirmed successfully. You can now log in to HAB Reporter.</p>
      <button id="open-app" type="button">Open HAB Reporter</button>
    </main>

    <script>
      (function () {
        var mobile =
          Boolean(navigator.userAgentData && navigator.userAgentData.mobile) ||
          /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '') ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        if (!mobile) return;

        var button = document.getElementById('open-app');
        document.getElementById('message').textContent =
          'Email confirmed successfully. Open the HAB Reporter app and log in.';
        button.style.display = 'block';

        function openApp() {
          window.location.assign(
            'com.chintan.cyanotracker://auth-confirmed' +
              window.location.search +
              window.location.hash
          );
        }

        button.addEventListener('click', openApp);
        openApp();
      })();
    </script>
  </body>
</html>
